version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Enables the /health/ready endpoint used by the healthcheck below
      KC_HEALTH_ENABLED: "true"
      # Keycloak resolves ${env.VAR} placeholders inside the imported realm
      # JSON at startup, so the Google secret never has to be committed to git.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8080:8080"
    volumes:
      # Mounts your custom realm JSON file into Keycloak's auto-import folder
      - ./doc/myapp-frontend-realm.json:/opt/keycloak/data/import/myapp-frontend-realm.json
    # Automatically imports the realm file on startup
    command: start-dev --import-realm
    healthcheck:
      # Keycloak's image doesn't ship curl/wget, so do a plain TCP check
      # against the management/health port.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - sso-net

  app1:
    build:
      context: ./keycloak-app-SSO
      dockerfile: Dockerfile
    container_name: app1
    environment:
      PORT: 3000
      # Server-side proxy target: container-to-container traffic uses the
      # "keycloak" service name, not localhost (browser-side keycloak-js
      # config still points at http://localhost:8080, since the browser
      # reaches Keycloak through the published host port above).
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "3000:3000"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - sso-net

  app2:
    build:
      context: ./keycloak-app-SSO-2
      dockerfile: Dockerfile
    container_name: app2
    environment:
      PORT: 3001
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "3001:3001"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - sso-net

networks:
  sso-net:
    driver: bridge
