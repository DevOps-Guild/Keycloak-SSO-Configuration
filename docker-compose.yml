version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8081:8080"
    volumes:
      - ./doc/myapp-frontend-realm.json:/opt/keycloak/data/import/myapp-frontend-realm.json:ro

  app1:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm@11.9.0 && pnpm install && pnpm run build && node server.js"
    environment:
      PORT: 3000
      KEYCLOAK_URL: http://keycloak:8080
      VITE_KEYCLOAK_URL: http://localhost:8081
      VITE_KEYCLOAK_REALM: myapp-frontend
      VITE_KEYCLOAK_CLIENT_ID: myapp-frontend
    volumes:
      - ./keycloak-app-SSO:/app
      - app1_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - keycloak
    dns:
      - 8.8.8.8
      - 8.8.4.4

  app2:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm@11.9.0 && pnpm install && pnpm run build && node server.js"
    environment:
      PORT: 3001
      KEYCLOAK_URL: http://keycloak:8080
      VITE_KEYCLOAK_URL: http://localhost:8081
      VITE_KEYCLOAK_REALM: myapp-frontend
      VITE_KEYCLOAK_CLIENT_ID: myapp-frontend-2
    volumes:
      - ./keycloak-app-SSO-2:/app
      - app2_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - keycloak
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  app1_node_modules:
  app2_node_modules: