services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --http-enabled=true --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8081:8080"
    volumes:
      - ./doc/myapp-frontend-realm.json:/opt/keycloak/data/import/myapp-frontend-realm.json:ro
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

  app1:
    build:
      context: ./keycloak-app-SSO
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8081}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-myapp-frontend}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID_APP1:-myapp-frontend}
    environment:
      PORT: 3000
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "3000:3000"
    depends_on:
      - keycloak
    restart: unless-stopped

  app2:
    build:
      context: ./keycloak-app-SSO-2
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8081}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-myapp-frontend}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID_APP2:-myapp-frontend-2}
    environment:
      PORT: 3001
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "3001:3001"
    depends_on:
      - keycloak
    restart: unless-stopped

volumes:
  keycloak_data:
